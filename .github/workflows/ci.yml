name: CI Pipeline

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name (e.g. triple-r-hub)"
        required: true
        type: string
      node_version:
        description: "Node.js version for linting/testing"
        required: false
        type: string
        default: "20"
      run_lint:
        description: "Run linting step"
        required: false
        type: boolean
        default: true
      run_tests:
        description: "Run test step"
        required: false
        type: boolean
        default: true
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"

jobs:
  branch-naming:
    name: Branch Naming
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [ -z "$BRANCH" ]; then
            echo "Not a pull request, skipping branch name check"
            exit 0
          fi
          PATTERN="^(feature|fix|chore|docs|refactor|test)/[a-z0-9._-]+$"
          if ! echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "::warning::Branch '$BRANCH' does not follow naming convention: <type>/<description> where type is one of: feature, fix, chore, docs, refactor, test"
          else
            echo "Branch name '$BRANCH' follows the convention."
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ inputs.run_lint }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          failure-threshold: error

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  scan-secrets:
    name: Scan Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          scanners: secret
